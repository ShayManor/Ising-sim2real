# Ablation profile: reproduce the shipped "fast" model (Ising-Decoder-SurfaceCode-1-Fast,
# model_id=1, receptive field R=9). Schema mirrors third_party/Ising-Decoding's
# conf/config_public.yaml; noise_model copied verbatim from conf/config_qec_decoder_r9_fp8.yaml
# (depolarizing p=0.006, 25-parameter circuit-level mapping).
#
# Selected via: PROFILE=fast_repro sbatch slurm/experiments/train_ising.sbatch

# === Model selection (Model 1 -> receptive field 9) ===
model_id: 1

# === Evaluation window (training is clamped to R=9 internally) ===
distance: 9
n_rounds: 9

# === Workflow ===
workflow:
  task: train

# === Data ===
data:
  code_rotation: O1
  # Circuit-level noise model for depolarizing p=0.006 (25-parameter mapping)
  noise_model:
    p_prep_X: 0.004   # 2*p/3
    p_prep_Z: 0.004
    p_meas_X: 0.004
    p_meas_Z: 0.004
    p_idle_cnot_X: 0.002   # p/3
    p_idle_cnot_Y: 0.002
    p_idle_cnot_Z: 0.002
    p_idle_spam_X: 0.003984   # 2*p/3 - 4*p^2/9
    p_idle_spam_Y: 0.003984
    p_idle_spam_Z: 0.003984
    p_cnot_IX: 0.0004   # p/15
    p_cnot_IY: 0.0004
    p_cnot_IZ: 0.0004
    p_cnot_XI: 0.0004
    p_cnot_XX: 0.0004
    p_cnot_XY: 0.0004
    p_cnot_XZ: 0.0004
    p_cnot_YI: 0.0004
    p_cnot_YX: 0.0004
    p_cnot_YY: 0.0004
    p_cnot_YZ: 0.0004
    p_cnot_ZI: 0.0004
    p_cnot_ZX: 0.0004
    p_cnot_ZY: 0.0004
    p_cnot_ZZ: 0.0004
